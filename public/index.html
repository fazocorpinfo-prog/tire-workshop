<!doctype html>
<html lang="uz" data-bio-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0f0f1a" />
<title>RLD shinomontaj</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/linkbio.css" />
</head>
<body>

<div class="bio-bg" aria-hidden="true"></div>

<button class="theme-toggle" id="themeToggle" type="button" aria-label="Mavzu">
  <svg class="ic-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
  <svg class="ic-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
</button>

<main class="bio-card" id="bioCard">
  <div class="bio-avatar-wrap">
    <img class="bio-avatar" id="bioAvatar" alt="" />
  </div>
  <h1 class="bio-name" id="bioName">RLD shinomontaj</h1>
  <p class="bio-desc" id="bioDesc"></p>

  <div class="bio-links" id="bioLinks"></div>

  <footer class="bio-footer">
    <span>© <span id="bioYear"></span> RLD shinomontaj</span>
  </footer>
</main>

<script src="/js/linkbio.js"></script>
</body>
</html>
